; PlatformIO project for the CYD (ESP32-2432S028R) macro pad firmware.
; See openspec/changes/add-macropad-mvp/design.md for the architecture this
; implements.

[platformio]
default_envs = esp32-2432S028R

; Real hardware target: ESP32-2432S028R "Cheap Yellow Display".
; Pin mapping below matches the commonly documented wiring for this board
; (TFT on the primary SPI bus, XPT2046 touch on a second SPI bus) - verify
; against the physical unit during bring-up (tasks 2.x), since CYD boards are
; white-labeled from multiple factories and details occasionally vary.
[env:esp32-2432S028R]
platform = espressif32
board = esp32dev
framework = arduino
board_build.filesystem = littlefs
; Single ~2MB app partition + ~1.9MB LittleFS, no second OTA slot - we don't
; do our own OTA (bmorcelli Launcher handles installation), and the default
; two-OTA-slot scheme left only ~64KB of headroom for this firmware (95.1%
; of a 1.31MB app0 partition on first build) - measured, not estimated.
board_build.partitions = no_ota.csv
monitor_speed = 115200
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    bblanchon/ArduinoJson @ ^7.0.4
build_flags =
    ; Errors/warnings only - was bumped to level 4 (verbose) during BLE
    ; pairing bring-up; dropped back down now that pairing/HID/config-push
    ; are all confirmed working on real hardware.
    -DCORE_DEBUG_LEVEL=1
    ; TFT_eSPI configuration for the ILI9341 panel on the ESP32-2432S028R.
    -DUSER_SETUP_LOADED=1
    -DILI9341_2_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=HIGH
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1

; Native (host) environment for unit tests only - no ESP32 toolchain or real
; hardware involved. Only the pure-logic libraries (macropad_config,
; macropad_transfer, macropad_icon) are exercised here; see design.md's
; "Test strategy".
[env:native]
platform = native
build_flags =
    -std=gnu++17
    -Ilib/macropad_config/include
    -Ilib/macropad_transfer/include
    -Ilib/macropad_icon/include
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.4
test_filter =
    test_config_validation
    test_chunk_reassembler
    test_icon_validation
