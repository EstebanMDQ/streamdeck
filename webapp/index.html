<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Streamdeck CYD Config</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <h1>Streamdeck CYD Config</h1>
      <div class="actions">
        <button id="connect-btn">Connect over Bluetooth</button>
        <button id="push-btn" disabled>Push to device</button>
      </div>
    </header>

    <div id="unsupported-banner" class="banner" hidden>
      This browser doesn't support Web Bluetooth. Use a recent version of
      Chrome or Edge (desktop or Android) to connect to your device.
    </div>

    <div id="status" class="status"></div>

    <main id="editor-root"></main>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
